<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<title>NutriCasa — Planejador Alimentar Inteligente</title>
<!-- PWA: instalável e offline -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NutriCasa">
<meta name="mobile-web-app-capable" content="yes">
<style>
/* ============================================================
   NUTRICASA — Design System
   ============================================================ */
:root{
  --bg: #f4f6f4;
  --bg-grad-1: #eef5ef;
  --bg-grad-2: #f7f3 ;
  --surface: #ffffff;
  --surface-2: #f7faf7;
  --surface-3: #eef2ee;
  --border: #e3e8e3;
  --text: #1c2620;
  --text-soft: #5c6a60;
  --text-faint: #93a097;
  --accent: #16a34a;
  --accent-d: #0f7a37;
  --accent-l: #dcf5e6;
  --accent-2: #0ea5a5;
  --amber: #e08a1e;
  --amber-l: #fcefd9;
  --rose: #e2486b;
  --rose-l: #fde2e9;
  --violet:#7c5cff;
  --violet-l:#ece7ff;
  --shadow-sm: 0 1px 2px rgba(20,40,28,.06), 0 1px 3px rgba(20,40,28,.05);
  --shadow-md: 0 4px 14px rgba(20,40,28,.08), 0 2px 6px rgba(20,40,28,.05);
  --shadow-lg: 0 16px 40px rgba(20,40,28,.14), 0 6px 14px rgba(20,40,28,.08);
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
  --t: .22s cubic-bezier(.4,0,.2,1);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
[data-theme="dark"]{
  --bg: #10140f;
  --bg-grad-1: #131a13;
  --bg-grad-2: #0e1410;
  --surface: #1a211a;
  --surface-2: #202a20;
  --surface-3: #28332a;
  --border: #2c382e;
  --text: #e8efe9;
  --text-soft: #a3b3a6;
  --text-faint: #6f7e73;
  --accent: #34d27e;
  --accent-d: #25b369;
  --accent-l: #18331f;
  --accent-2: #2dd4d4;
  --amber: #f0a942;
  --amber-l: #352915;
  --rose: #ff6b8a;
  --rose-l: #361a22;
  --violet:#9d83ff;
  --violet-l:#231d3d;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.45);
  --shadow-lg: 0 18px 44px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 90% -10%, var(--accent-l), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, var(--violet-l), transparent 55%),
    linear-gradient(160deg, var(--bg-grad-1), var(--bg));
  background-attachment: fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{height:9px;width:9px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint)}

/* ===================== LAYOUT ===================== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex-shrink:0;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;padding:20px 14px;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(14px);
  border-right:1px solid var(--border);
}
[data-theme="dark"] .sidebar{background:rgba(20,26,20,.55)}
.brand{display:flex;align-items:center;gap:11px;padding:6px 10px 16px}
.brand-logo{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;font-size:23px;color:#fff;
  box-shadow:0 6px 16px rgba(22,163,74,.35);
}
.brand-txt strong{display:block;font-size:16.5px;letter-spacing:-.4px}
.brand-txt span{font-size:11.5px;color:var(--text-soft)}
.nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1;margin:0 -4px;padding:0 4px}
.nav::-webkit-scrollbar{width:0}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:13px;
  font-size:14px;font-weight:550;color:var(--text-soft);
  transition:var(--t);position:relative;text-align:left;width:100%;
}
.nav-item .ic{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 6px 16px rgba(22,163,74,.32)}
.nav-item.active .ic{transform:scale(1.05)}
.nav-badge{
  margin-left:auto;font-size:11px;font-weight:700;min-width:20px;height:20px;
  padding:0 6px;border-radius:20px;background:var(--surface-3);color:var(--text-soft);
  display:grid;place-items:center;
}
.nav-item.active .nav-badge{background:rgba(255,255,255,.25);color:#fff}
.side-foot{padding:10px 8px 2px;border-top:1px solid var(--border);margin-top:6px}
.theme-toggle{
  display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:12px;
  font-size:13px;font-weight:550;color:var(--text-soft);background:var(--surface-2);
}
.theme-toggle:hover{color:var(--text)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  padding:14px 26px;background:rgba(255,255,255,.7);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
[data-theme="dark"] .topbar{background:rgba(16,20,15,.7)}
.menu-btn{display:none;font-size:22px;width:40px;height:40px;border-radius:11px;background:var(--surface-2)}
.topbar h1{font-size:19px;letter-spacing:-.5px;font-weight:750;flex-shrink:0}
.topbar .sub{font-size:12.5px;color:var(--text-soft);margin-left:-6px;display:none}
.top-spacer{flex:1}
.intens-pill{
  display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;
  font-size:13px;font-weight:650;background:var(--surface-2);border:1px solid var(--border);
}
.intens-dot{width:9px;height:9px;border-radius:50%}
.content{padding:26px;max-width:1180px;width:100%;margin:0 auto;flex:1}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===================== HEADERS ===================== */
.view-head{margin-bottom:20px}
.view-head h2{font-size:25px;letter-spacing:-.6px;font-weight:780;display:flex;align-items:center;gap:11px}
.view-head h2 .emj{font-size:26px}
.view-head p{color:var(--text-soft);font-size:14.5px;margin-top:5px;max-width:680px}

.section-title{font-size:15px;font-weight:700;margin:24px 0 12px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.section-title .pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--accent-l);color:var(--accent-d)}

/* ===================== BUTTONS / CHIPS ===================== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:13px;font-size:14px;font-weight:650;
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  transition:var(--t);box-shadow:var(--shadow-sm);
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(22,163,74,.3)}
.btn-primary:hover{box-shadow:0 12px 26px rgba(22,163,74,.4)}
.btn-ghost{background:var(--surface-2);box-shadow:none}
.btn-sm{padding:8px 13px;font-size:13px;border-radius:11px}
.btn-block{width:100%}
.chip{
  display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:30px;
  font-size:13.5px;font-weight:600;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text-soft);transition:var(--t);user-select:none;
}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 5px 14px rgba(22,163,74,.3)}
.chip .x{font-size:11px;opacity:.7}
.chip-row{display:flex;flex-wrap:wrap;gap:9px}

/* ===================== CARDS ===================== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:20px}
.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-auto{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.g-auto-sm{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}

/* ===================== STAT CARDS ===================== */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:8px}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:16px 17px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.stat .lab{font-size:12px;color:var(--text-soft);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .num{font-size:27px;font-weight:800;letter-spacing:-1px;margin-top:3px}
.stat .num small{font-size:14px;color:var(--text-faint);font-weight:600}
.stat .ic{position:absolute;right:-6px;top:-6px;font-size:46px;opacity:.08}

/* ===================== ESTOQUE ===================== */
.toolbar{
  display:flex;gap:11px;flex-wrap:wrap;align-items:center;margin-bottom:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 13px;box-shadow:var(--shadow-sm);
}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--surface-2);border-radius:11px;padding:9px 13px;border:1px solid transparent;transition:var(--t)}
.search:focus-within{border-color:var(--accent);background:var(--surface)}
.search input{border:none;background:none;outline:none;flex:1;font-size:14px;color:var(--text)}
.search .ic{font-size:16px;color:var(--text-faint)}
.cat-filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;margin-bottom:16px;scrollbar-width:none}
.cat-filter::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:30px;
  font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-soft);transition:var(--t);
}
.cat-pill:hover{color:var(--text)}
.cat-pill.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.cat-block{margin-bottom:26px}
.cat-head{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.cat-head .emj{font-size:21px}
.cat-head h3{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cat-head .count{font-size:12px;color:var(--text-soft);background:var(--surface-3);padding:2px 9px;border-radius:20px;font-weight:600}
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px}
.food{
  display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;
  background:var(--surface);border:1.5px solid var(--border);transition:var(--t);
  text-align:left;position:relative;overflow:hidden;flex-wrap:wrap;cursor:pointer;user-select:none;
}
.food:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.food .emj{font-size:21px;flex-shrink:0;transition:var(--t)}
.food .nm{font-size:13px;font-weight:600;line-height:1.2}
.food.on{background:var(--accent-l);border-color:var(--accent)}
[data-theme="dark"] .food.on{background:var(--accent-l)}
.food.on .nm{color:var(--accent-d);font-weight:700}
.food.on .emj{transform:scale(1.12)}
.food .check{
  position:absolute;top:7px;right:7px;width:18px;height:18px;border-radius:50%;
  background:var(--accent);color:#fff;display:none;place-items:center;font-size:11px;font-weight:800;
}
.food.on .check{display:grid}
/* quantity stepper */
.qty{display:none;align-items:center;justify-content:center;width:100%;gap:6px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);flex-wrap:wrap}
.food.on .qty{display:flex}
.qty button{width:25px;height:25px;border-radius:8px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);font-size:15px;font-weight:800;color:var(--accent-d);line-height:1;transition:var(--t)}
.qty button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.qv-input,.lqv-input{width:52px;flex:1;min-width:40px;text-align:center;font-size:13.5px;font-weight:800;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 2px;outline:none;-moz-appearance:textfield;appearance:textfield}
.qv-input:focus,.lqv-input:focus{border-color:var(--accent)}
.qv-input::-webkit-outer-spin-button,.qv-input::-webkit-inner-spin-button,.lqv-input::-webkit-outer-spin-button,.lqv-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.unit-sel{width:100%;font-size:12px;font-weight:650;color:var(--text-soft);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 6px;outline:none;cursor:pointer}
.unit-sel:focus{border-color:var(--accent)}
.lqty{display:flex;width:auto;margin:0;padding:0;border:none;gap:5px;flex-wrap:nowrap}
.lqty button{width:26px;height:26px;background:var(--surface-2)}
.lqty .lqv-input{width:46px;flex:none}
.lqty .unit-sel{width:auto;min-width:72px}
/* consumo da semana */
.consumo-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;background:var(--surface-2);margin-bottom:8px}
.consumo-row.short{background:var(--amber-l)}
.consumo-row.ref{background:var(--surface-2)}
.consumo-row .ctag.refbtn{background:var(--violet-l);color:var(--violet);cursor:pointer;transition:var(--t)}
.consumo-row .ctag.refbtn:hover{background:var(--violet);color:#fff}
.consumo-row .emj{font-size:19px;flex-shrink:0}
.consumo-row .cn{font-size:13.5px;font-weight:650;min-width:96px;flex-shrink:0}
.consumo-row .cbar{flex:1;height:7px;border-radius:20px;background:var(--surface-3);overflow:hidden;min-width:50px}
.consumo-row .cbar > div{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.consumo-row.short .cbar > div{background:linear-gradient(90deg,var(--amber),#f0a942)}
.consumo-row .cnum{font-size:11.5px;color:var(--text-soft);font-weight:600;white-space:nowrap}
.consumo-row .ctag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.consumo-row .ctag.short{background:var(--amber);color:#fff}
.consumo-row .ctag.ok{background:var(--accent-l);color:var(--accent-d)}
@media(max-width:560px){.consumo-row .cbar{display:none}.consumo-row .cn{min-width:0}}

/* ===================== PROFILE / INTENSITY ===================== */
.intens-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.intens-card{
  border:2px solid var(--border);border-radius:var(--r-lg);padding:22px;background:var(--surface);
  cursor:pointer;transition:var(--t);position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
}
.intens-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.intens-card .ribbon{position:absolute;inset:0 0 auto auto;width:120px;height:120px;border-radius:50%;filter:blur(34px);opacity:.18;transform:translate(35%,-35%)}
.intens-card .emj{font-size:34px;display:block;margin-bottom:10px}
.intens-card h3{font-size:19px;font-weight:760;letter-spacing:-.4px}
.intens-card .tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin:8px 0}
.intens-card p{font-size:13.5px;color:var(--text-soft);line-height:1.5}
.intens-card .feats{margin-top:13px;display:flex;flex-direction:column;gap:7px}
.intens-card .feats div{font-size:12.5px;color:var(--text-soft);display:flex;gap:8px;align-items:center}
.intens-card .feats div::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.intens-card.sel{border-color:var(--accent);background:var(--accent-l)}
[data-theme="dark"] .intens-card.sel{background:var(--surface-2);border-color:var(--accent)}
.intens-card .selbadge{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px;display:none;align-items:center;gap:5px}
.intens-card.sel .selbadge{display:inline-flex}

/* ===================== GOAL CARDS ===================== */
.goal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
.goal{
  border:1.5px solid var(--border);border-radius:var(--r-md);padding:15px;background:var(--surface);
  transition:var(--t);text-align:left;display:flex;flex-direction:column;gap:6px;
}
.goal:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.goal .emj{font-size:25px}
.goal .nm{font-size:14px;font-weight:680}
.goal .ds{font-size:11.5px;color:var(--text-soft)}
.goal.on{border-color:var(--accent);background:var(--accent-l)}
[data-theme="dark"] .goal.on{background:var(--surface-2)}
.goal.on .nm{color:var(--accent-d)}

/* ===================== METAS / PROGRESS ===================== */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
.meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow-sm);text-align:center}
.ring{position:relative;width:84px;height:84px;margin:0 auto 8px}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:grid;place-items:center;font-size:18px;font-weight:800}
.meta-card .lab{font-size:13px;font-weight:650}
.meta-card .sub{font-size:11px;color:var(--text-soft)}
.meta-ctrl{display:flex;gap:7px;justify-content:center;margin-top:10px}
.meta-ctrl button{width:30px;height:30px;border-radius:9px;background:var(--surface-2);font-size:17px;font-weight:700;color:var(--text-soft);transition:var(--t)}
.meta-ctrl button:hover{background:var(--accent);color:#fff}
.progress-bar{height:8px;border-radius:20px;background:var(--surface-3);overflow:hidden;margin-top:9px}
.progress-bar > div{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ===================== TIMELINE / CRONOGRAMA ===================== */
.timeline{position:relative;padding-left:42px}
.timeline::before{content:"";position:absolute;left:15px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--accent),var(--accent-2),transparent)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-34px;top:4px;width:32px;height:32px;border-radius:10px;background:var(--surface);border:2px solid var(--accent);display:grid;place-items:center;font-size:15px;box-shadow:var(--shadow-sm);z-index:1}
.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--shadow-sm);transition:var(--t)}
.tl-card:hover{box-shadow:var(--shadow-md)}
.tl-time{font-size:12px;font-weight:700;color:var(--accent-d);letter-spacing:.3px}
.tl-meal{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint)}
.tl-card h4{font-size:16px;font-weight:700;margin:3px 0 4px;letter-spacing:-.3px}
.tl-ings{font-size:12.5px;color:var(--text-soft)}
.tl-foot{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap}
.tl-meta{font-size:11.5px;color:var(--text-faint);display:inline-flex;align-items:center;gap:4px}

/* ===================== RECIPE CARDS ===================== */
.rec-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--shadow-sm);transition:var(--t);display:flex;flex-direction:column;
}
.rec-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.rec-thumb{height:96px;display:grid;place-items:center;font-size:46px;position:relative;background:var(--surface-2)}
.rec-fav{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);display:grid;place-items:center;font-size:16px;transition:var(--t);box-shadow:var(--shadow-sm)}
[data-theme="dark"] .rec-fav{background:rgba(0,0,0,.4)}
.rec-fav:hover{transform:scale(1.12)}
.rec-fav.on{color:var(--rose)}
.match-tag{position:absolute;top:10px;left:10px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;color:#fff;display:inline-flex;align-items:center;gap:5px}
.rec-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.rec-body h4{font-size:15.5px;font-weight:720;letter-spacing:-.3px}

.rec-meta span{font-size:11.5px;color:var(--text-soft);display:inline-flex;align-items:center;gap:4px;font-weight:600}
.rec-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
.rtag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--surface-3);color:var(--text-soft)}
.rtag.miss{background:var(--amber-l);color:var(--amber)}
.rec-foot{margin-top:auto;display:flex;gap:8px}
.miss-note{font-size:11.5px;color:var(--amber);font-weight:600;margin-bottom:9px;display:flex;align-items:flex-start;gap:5px}

.list-item{
  display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--surface);

}
.list-item:hover{box-shadow:var(--shadow-md)}
.lcheck{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);flex-shrink:0;display:grid;place-items:center;transition:var(--t);font-size:13px;color:#fff}
.lcheck.on{background:var(--accent);border-color:var(--accent)}
.list-item.done .lname{text-decoration:line-through;color:var(--text-faint)}
.lname{flex:1;font-size:14.5px;font-weight:600}
.ltag{font-size:11px;color:var(--text-soft);background:var(--surface-3);padding:3px 9px;border-radius:20px;font-weight:600}
.del-btn{width:32px;height:32px;border-radius:9px;color:var(--text-faint);font-size:16px;transition:var(--t)}
.del-btn:hover{background:var(--rose-l);color:var(--rose)}

.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow-sm);transition:var(--t)}
.sub-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.sub-flow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sub-from,.sub-to{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:11px;font-size:13.5px;font-weight:650}
.sub-from{background:var(--rose-l);color:var(--rose)}
.sub-to{background:var(--accent-l);color:var(--accent-d)}
.sub-arrow{font-size:17px;color:var(--text-faint)}
.sub-why{font-size:12.5px;color:var(--text-soft);margin-top:10px;line-height:1.5}

/* ===================== STRATEGY CARDS ===================== */
.strat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm);transition:var(--t)}
.strat-card:hover{box-shadow:var(--shadow-md)}
.strat-card .head{display:flex;align-items:center;gap:13px;margin-bottom:13px}
.strat-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:23px;flex-shrink:0}
.strat-card h3{font-size:16.5px;font-weight:730;letter-spacing:-.3px}
.strat-card .sub{font-size:12px;color:var(--text-soft)}
.strat-list{display:flex;flex-direction:column;gap:10px}
.strat-list li{list-style:none;display:flex;gap:10px;font-size:13.5px;color:var(--text-soft);line-height:1.5}
.strat-list li .b{flex-shrink:0;width:22px;height:22px;border-radius:7px;background:var(--accent-l);color:var(--accent-d);display:grid;place-items:center;font-size:12px;font-weight:800;margin-top:1px}

/* ===================== WEEK GRID ===================== */
.week-scroll{overflow-x:auto;padding-bottom:6px}
.week-grid{display:grid;grid-template-columns:90px repeat(7,minmax(140px,1fr));gap:8px;min-width:760px}
.wk-cell{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 10px;font-size:12px;min-height:46px}
.wk-head{font-weight:800;text-align:center;background:var(--text);color:var(--surface);border-color:var(--text);display:grid;place-items:center;font-size:12.5px}
.wk-label{font-weight:700;display:flex;align-items:center;justify-content:flex-start;background:var(--surface-2);color:var(--text-soft);font-size:11.5px}
.wk-cell .meal{font-weight:650;line-height:1.25}
.wk-cell.empty{color:var(--text-faint);font-style:italic}

.empty .emj{font-size:54px;display:block;margin-bottom:14px;opacity:.85}
.empty h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty p{font-size:14px;max-width:420px;margin:0 auto 18px}

/* ===================== MODAL ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(15,25,18,.55);backdrop-filter:blur(4px);z-index:100;display:none;place-items:center;padding:20px;animation:fade .2s}
.modal-bg.show{display:grid}
.modal{background:var(--surface);border-radius:var(--r-xl);max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:pop .3s cubic-bezier(.34,1.4,.5,1)}

.modal-thumb{height:120px;display:grid;place-items:center;font-size:60px;border-radius:var(--r-xl) var(--r-xl) 0 0}
.modal-body{padding:22px 24px 26px}
.modal-body h2{font-size:22px;font-weight:780;letter-spacing:-.5px}
.modal-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.9);display:grid;place-items:center;font-size:18px;box-shadow:var(--shadow-sm);z-index:2}
[data-theme="dark"] .modal-close{background:rgba(0,0,0,.5)}
.ing-list{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.ing-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;background:var(--surface-2);font-size:13.5px}
.ing-row .st{margin-left:auto;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.ing-row .st.have{background:var(--accent-l);color:var(--accent-d)}
.ing-row .st.miss{background:var(--amber-l);color:var(--amber)}
.step-list{counter-reset:s;display:flex;flex-direction:column;gap:11px;margin-top:6px}
.step-list li{list-style:none;display:flex;gap:12px;font-size:14px;color:var(--text-soft);line-height:1.5}
.step-list li::before{counter-increment:s;content:counter(s);flex-shrink:0;width:26px;height:26px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800}

/* ===================== TOAST ===================== */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:9px;align-items:center;pointer-events:none}
.toast{background:var(--text);color:var(--surface);padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:650;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;animation:toastIn .3s cubic-bezier(.34,1.4,.5,1)}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.toast .ic{font-size:16px}

/* ===================== MISC ===================== */
.divider{height:1px;background:var(--border);margin:22px 0}
.muted{color:var(--text-soft)}
.banner{

}
.banner .emj{font-size:28px}
.banner h4{font-size:15px;font-weight:720}
.banner p{font-size:13px;color:var(--text-soft)}
.fab-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tab-scrim{display:none}

/* ===================== RESPONSIVE ===================== */
@media(max-width:880px){

}
@media(max-width:760px){

  .menu-btn{display:grid;place-items:center}
  .content{padding:18px 16px}
  .topbar{padding:12px 16px}
  .topbar h1{font-size:17px}
  .intens-pill span.lbl{display:none}
  .view-head h2{font-size:22px}

@media(min-width:1100px){.topbar .sub{display:block}}

/* ---------- QUANTIDADES / UNIDADES ---------- */
const CAT_UNIT = {
  "Frutas":"un","Verduras":"maço","Legumes":"un","Proteínas animais":"porção","Ovos":"un",
  "Frios":"fatias","Queijos":"porção","Laticínios":"porção","Pães":"un","Massas":"porção","Grãos":"porção",
  "Arroz":"porção","Feijões":"porção","Tubérculos":"un","Cereais":"porção","Embutidos":"porção",
  "Congelados":"un","Temperos":"un","Conservas":"lata","Bebidas":"un","Cafés":"un",
  "Chás":"un","Doces":"un","Sobremesas":"un","Snacks":"pacote","Industrializados":"un","Ingredientes":"un"
};
const UNIT_OVERRIDE = { leite:"L", iogurte:"un", agua:"L", refrigerante:"garrafa", suco:"un", aguacoco:"un", leitevegetal:"L", milho:"un" };
// unidades que o usuário pode escolher
const UNIDADES = ["un","fatia","pacote","½ pacote","lata","g","kg","ml","L","colher","xícara","copo","prato","porção","maço","dente","punhado"];
// unidade de REFERÊNCIA da receita (usada para o cálculo de consumo). Não muda.
function refUnitOf(id){ const f=FOOD_MAP[id]; if(!f) return "un"; return UNIT_OVERRIDE[id] || CAT_UNIT[f.cat] || "un"; }
// unidade efetiva: a que o usuário escolheu, ou a de referência por padrão
function unitOf(id){ return state.unidade[id] || refUnitOf(id); }
function qtyOf(id){ return state.qtd[id]!=null ? state.qtd[id] : (has(id)?1:0); }
// passo do +/- conforme a unidade (gramas/ml em saltos de 50; kg/L de 0,5)
function stepFor(u){ if(u==="g"||u==="ml") return 50; if(u==="kg"||u==="L") return 0.5; return 1; }
// formata número (remove .0 e usa vírgula)
function fmtQty(n){ return (Math.round(n*100)/100).toString().replace(".",","); }
// opções <option> de unidades, garantindo a atual mesmo se for custom
function unitOptions(cur){
  const opts = UNIDADES.includes(cur) ? UNIDADES : [cur, ...UNIDADES];
  return opts.map(u=>`<option value="${u}" ${u===cur?'selected':''}>${u}</option>`).join("");
}
// <select> de unidades para um item do estoque
function unitSelect(id){
  return `<select class="unit-sel" data-id="${id}" data-action="noop">${unitOptions(unitOf(id))}</select>`;
}
// ingredientes cujo consumo NÃO é rastreado por quantidade (uso indeterminado)
function trackable(id){ const f=FOOD_MAP[id]; return !!f && f.cat!=="Temperos" && f.cat!=="Ingredientes"; }
// quanto uma receita consome de um ingrediente (padrão 1; overrides abaixo)
const RECIPE_NEED = {
  "ovos-queijo":{ovo:3}, "pao-ovo":{ovo:2}, "crepioca":{ovo:2}, "omelete-legumes":{ovo:3},
  "cuscuz-ovo":{ovo:2}, "panqueca-banana":{banana:2}, "pao-requeijao-peru":{paointegral:2},
  "carne-legumes":{tomate:2}, "file-pure":{batata:4}, "peixe-assado":{batata:3},
  "salada-completa":{ovo:2}, "arroz-legumes-ovo":{ovo:2}, "bife-acebolado":{cebola:2},
  "sanduiche-natural":{paointegral:2}, "omelete-leve":{ovo:3}, "salada-atum":{ovo:2},
  "sopa-legumes":{batata:2}, "caldo-verde":{batata:3}, "arroz-ovo-sobras":{ovo:2}, "pao-queijo-cafe":{paoqueijo:3},
};
function ingNeed(r,id){ const n=RECIPE_NEED[r.id]; return (n && n[id]!=null) ? n[id] : 1; }
// ingredientes que uma receita de fato usaria (essenciais + opcionais em estoque), rastreáveis
function ingUsados(r){
  const used=new Set(r.ess||[]);
  (r.opt||[]).forEach(id=>{ if(has(id)) used.add(id); });
  if(r.optAny){ const a=r.optAny.find(id=>has(id))||r.optAny[0]; if(a) used.add(a); }
  return [...used].filter(trackable);
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i];a[i]=a[j];a[j]=t; } return a; }

/* ============================================================
   RECIPE ENGINE
   ============================================================ */
function recipeRestrictionTags(r){
  // junta props de todos os ingredientes (ess+opt) para checar restrições
  const ids = [...(r.ess||[]),...(r.opt||[])];
  const tags = new Set();
  ids.forEach(id=>{ const f=FOOD_MAP[id]; if(f) f.props.forEach(p=>tags.add(p)); });
  return tags;
}
function violatesRestriction(r){
  // Só considera ingredientes ESSENCIAIS para restrições (opcionais podem ser omitidos),
  // exceto vegetariano/vegano que olham o conceito do prato via essenciais.
  for(const rid of state.restricoes){
    const banned = RESTRICAO_TAGS[rid];
    if(!banned) continue;
    for(const id of (r.ess||[])){
      const f=FOOD_MAP[id];
      if(f && f.props.some(p=>banned.includes(p))) return RESTRICOES.find(x=>x[0]===rid)[1];
    }
  }
  return null;
}
function recipeMatch(r){
  const ess = r.ess||[];
  let missing = ess.filter(id=>!has(id));
  // optAny: precisa ter ao menos um
  if(r.optAny && r.optAny.length){
    const okAny = r.optAny.some(id=>has(id));
    if(!okAny) missing = [...missing, r.optAny[0]];
  }
  const optHave = (r.opt||[]).filter(id=>has(id)).length;
  const optTotal = (r.opt||[]).length || 1;
  const essScore = ess.length ? (ess.length-missing.filter(m=>ess.includes(m)).length)/ess.length : 1;
  const score = essScore*0.75 + (optHave/optTotal)*0.25;
  return {missing, optHave, score, complete:missing.length===0, essScore};
}
// retorna receitas ordenadas; mode: 'makeable' (sem essenciais faltando) ou 'all'
function getRecipes({tipo=null,intens=null,mode="all",onlyFav=false,maxMissing=99,rapida=false}={}){
  let list = RECIPES.slice();
  if(tipo) list = list.filter(r=>r.tipo.includes(tipo));
  if(intens) list = list.filter(r=>r.intens.includes(intens));
  if(onlyFav) list = list.filter(r=>isFav(r.id));
  if(rapida) list = list.filter(r=>r.tempo<=15);
  const out = [];
  for(const r of list){
    if(violatesRestriction(r)) continue;
    const m = recipeMatch(r);
    if(mode==="makeable" && !m.complete) continue;
    if(m.missing.length>maxMissing) continue;
    out.push({...r, ...m});
  }
  out.sort((a,b)=> (b.complete-a.complete) || (b.score-a.score) || (a.tempo-b.tempo));
  return out;
}
function gerarCardapio(){
  const cfg = INTENS[state.intensidade];
  const plano = [];
  const used = new Set();
  for(const [hora,label,tipo] of cfg.refeicoes){
    // prioriza o que dá pra fazer; se nada, pega o melhor parcial
    let cands = getRecipes({tipo, intens:state.intensidade}).filter(r=>!used.has(r.id));
    if(!cands.length) cands = getRecipes({tipo, intens:state.intensidade});
    // dá leve aleatoriedade entre os 3 melhores completos
    const completos = cands.filter(r=>r.complete);
    const pool = completos.length ? completos.slice(0,3) : cands.slice(0,3);
    const pick = pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
    if(pick) used.add(pick.id);
    plano.push({hora,label,tipo,recipe:pick});
  }
  return plano;
}
// gera a semana garantindo variedade: nenhuma receita repetida em dias seguidos
function gerarSemana(){
  const cfg = INTENS[state.intensidade];
  const dias = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
  const slots = cfg.refeicoes.map(r=>[r[1],r[2]]); // [label, tipo]
  const grid = slots.map(s=>{
    let pool = getRecipes({tipo:s[1], intens:state.intensidade});
    pool = pool.filter(r=>r.complete).length ? pool.filter(r=>r.complete) : pool;
    pool = shuffle(pool.slice());
    const ids = [];
    for(let d=0; d<7; d++){
      // percorre a pool em ordem: dias consecutivos sempre diferem quando há 2+ receitas
      const r = pool.length ? pool[d % pool.length] : null;
      ids.push(r ? r.id : null);
    }
    return {label:s[0], tipo:s[1], ids};
  });
  return {intensidade:state.intensidade, dias, grid};
}
// soma o consumo de ingredientes da semana planejada e compara com o estoque.
// O cálculo é EXATO quando a unidade do estoque é a mesma de referência da receita;
// se o usuário escolheu outra unidade (ex.: kg, ml, ½ pacote), vira uma REFERÊNCIA.
function consumoSemana(){
  if(!state.semana) return [];
  const need = {}, usos = {};
  for(const row of state.semana.grid){
    for(const id of row.ids){
      if(!id) continue;
      const r = RECIPES.find(x=>x.id===id); if(!r) continue;
      for(const iid of ingUsados(r)){
        need[iid] = (need[iid]||0) + ingNeed(r,iid);
        usos[iid] = (usos[iid]||0) + 1;
      }
    }
  }
  return Object.keys(need).map(id=>{
    const f = FOOD_MAP[id];
    const refUnit = refUnitOf(id);
    const userUnit = unitOf(id);
    const have = qtyOf(id);
    const preciso = (userUnit===refUnit);           // unidades batem → subtração exata
    const falta = preciso ? Math.max(0, need[id]-have) : 0;
    return {id, nome:f?f.nome:id, emoji:f?f.emoji:"🛒", cat:f?f.cat:"",
      refUnit, userUnit, need:need[id], usos:usos[id], have, preciso, falta};
  }).sort((a,b)=> b.falta-a.falta || (b.preciso-a.preciso) || b.need-a.need);
}

    compras:renderCompras, favoritos:renderFavoritos, historico:renderHistorico,
  }[currentTab];
  el.innerHTML = `<div class="view active">${r()}</div>`;
}

function head(emj,titulo,desc){
  return `<div class="view-head"><h2><span class="emj">${emj}</span>${titulo}</h2><p>${desc}</p></div>`;
}

/* ---------- ESTOQUE ---------- */
function renderEstoque(){
  const total = state.estoque.length;
  const q = estoqueSearch.trim().toLowerCase();
  let foods = FOODS.map(f=>FOOD_MAP[f[0]]);
  if(q) foods = foods.filter(f=>f.nome.toLowerCase().includes(q));
  if(estoqueCat!=="todas") foods = foods.filter(f=>f.cat===estoqueCat);

  const catPills = `<div class="cat-filter">
    <button class="cat-pill ${estoqueCat==='todas'?'on':''}" data-action="filter-cat" data-cat="todas">🍴 Todas</button>
    ${CATS.map(c=>`<button class="cat-pill ${estoqueCat===c?'on':''}" data-action="filter-cat" data-cat="${c}">${CAT_EMOJI[c]} ${c}</button>`).join("")}
  </div>`;

  // agrupa por categoria
  const byCat = {};
  foods.forEach(f=>{ (byCat[f.cat]=byCat[f.cat]||[]).push(f); });
  const order = estoqueCat!=="todas" ? [estoqueCat] : CATS;
  let blocks = order.filter(c=>byCat[c]).map(c=>{
    const items = byCat[c];
    const sel = items.filter(f=>has(f.id)).length;
    return `<div class="cat-block">
      <div class="cat-head"><span class="emj">${CAT_EMOJI[c]}</span><h3>${c}</h3>
        <span class="count">${sel}/${items.length} no estoque</span></div>
      <div class="food-grid">
        ${items.map(f=>`<div class="food ${has(f.id)?'on':''}" data-action="toggle-food" data-id="${f.id}">
          <span class="check">✓</span><span class="emj">${f.emoji}</span><span class="nm">${f.nome}</span>
          <div class="qty" data-action="noop">
            <button data-action="qtd-dec" data-id="${f.id}" aria-label="diminuir">−</button>
            <input class="qv-input" type="number" inputmode="decimal" min="0" step="${stepFor(unitOf(f.id))}" value="${qtyOf(f.id)}" data-id="${f.id}" aria-label="quantidade">
            <button data-action="qtd-inc" data-id="${f.id}" aria-label="aumentar">＋</button>
            ${unitSelect(f.id)}
          </div></div>`).join("")}
      </div></div>`;
  }).join("");
  if(!blocks) blocks = `<div class="empty"><span class="emj">🔍</span><h3>Nada encontrado</h3><p>Tente outro termo ou categoria.</p></div>`;

  const makeable = getRecipes({mode:"makeable"}).length;
  return `
  ${head("🛒","Meu Estoque","Marque o que você tem em casa. Em cada item você define a quantidade (pode ser fracionada, ex.: 0,5) e escolhe a unidade de medida.")}
  <div class="banner" style="background:linear-gradient(120deg,var(--violet-l),var(--surface-2))">
    <span class="emj">📏</span>
    <div><h4>Você define a medida</h4><p>Digite a quantidade no campo (ex.: <b>0,5</b> para meio pacote ou <b>250</b> para 250 ml) e troque a unidade no seletor ao lado — un, g, kg, ml, L, pacote, fatia, copo… Não precisa adivinhar o que é "1 porção".</p></div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="lab">📦 No estoque</div><div class="num">${total}<small> itens</small></div><span class="ic">📦</span></div>
    <div class="stat"><div class="lab">👨‍🍳 Dá pra fazer agora</div><div class="num">${makeable}<small> receitas</small></div><span class="ic">👨‍🍳</span></div>
    <div class="stat"><div class="lab">🗂️ Categorias</div><div class="num">${new Set(state.estoque.map(id=>FOOD_MAP[id]?.cat)).size}</div><span class="ic">🗂️</span></div>
  </div>
  <div class="toolbar">
    <div class="search"><span class="ic">🔍</span><input id="estoqueSearch" placeholder="Buscar alimento... (ex.: frango, pão, café)" value="${estoqueSearch.replace(/"/g,'&quot;')}"></div>
    <button class="btn btn-sm btn-ghost" data-action="add-essentials">✨ Itens comuns</button>
    ${total?`<button class="btn btn-sm btn-ghost" data-action="clear-estoque">🗑️ Limpar</button>`:""}
    <button class="btn btn-sm btn-primary" data-action="nav" data-tab="cardapios">Gerar cardápio →</button>
  </div>
  ${catPills}
  ${blocks}`;
}

/* ---------- CARDÁPIOS ---------- */
function renderCardapios(){
  const c = INTENS[state.intensidade];
  if(!state.estoque.length){
    return head("📋","Cardápios","Seu plano alimentar do dia, montado a partir do que você tem em casa.") +
      emptyEstoque();
  }
  if(!state.cardapio || state.cardapio.intensidade!==state.intensidade){
    state.cardapio = {intensidade:state.intensidade, plano:gerarCardapio(), date:todayStr()};
    save();
  }
  const plano = state.cardapio.plano;

  // metas / progresso
  const metasHtml = Object.entries(c.metas).map(([k,goal])=>{
    const cur = state.metasDia[k]||0;
    const info = METAS_INFO[k];
    const pct = Math.min(100, Math.round(cur/goal*100));
    const R=34, circ=2*Math.PI*R, off=circ-(pct/100)*circ;
    return `<div class="meta-card">
      <div class="ring">
        <svg width="84" height="84" viewBox="0 0 84 84">
          <circle cx="42" cy="42" r="${R}" fill="none" stroke="var(--surface-3)" stroke-width="8"/>
          <circle cx="42" cy="42" r="${R}" fill="none" stroke="${info.cor}" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s"/>
        </svg>
        <div class="val">${info.emj}</div>
      </div>
      <div class="lab">${info.lab}</div>
      <div class="sub">${cur} / ${goal} ${info.sub}</div>
      <div class="meta-ctrl">
        <button data-action="meta-dec" data-meta="${k}">−</button>
        <button data-action="meta-inc" data-meta="${k}">+</button>
      </div>
    </div>`;
  }).join("");

  // cronograma
  const tl = plano.map(p=>{
    const r = p.recipe;
    if(!r) return `<div class="tl-item"><div class="tl-dot">🍽️</div>
      <div class="tl-card"><div class="tl-time">${p.hora}</div><div class="tl-meal">${p.label}</div>
      <h4 style="color:var(--text-faint)">Sem sugestão ainda</h4>
      <div class="tl-ings">Adicione mais alimentos ao estoque para preencher esta refeição.</div></div></div>`;
    const have = (r.opt||[]).filter(id=>has(id)).concat((r.ess||[]).filter(id=>has(id)));
    const ingNames = have.slice(0,5).map(id=>FOOD_MAP[id]?.nome).filter(Boolean).join(", ");
    return `<div class="tl-item"><div class="tl-dot">${r.emj}</div>
      <div class="tl-card" data-action="open-recipe" data-id="${r.id}" style="cursor:pointer">
        <div class="tl-time">${p.hora}</div><div class="tl-meal">${p.label}</div>
        <h4>${r.nome}</h4>
        <div class="tl-ings">${ingNames || r.desc}</div>
        <div class="tl-foot">
          <span class="tl-meta">⏱️ ${r.tempo} min</span>
          <span class="tl-meta">🔥 ~${r.kcal} kcal</span>
          ${r.missing.length?`<span class="tl-meta" style="color:var(--amber)">🛒 faltam ${r.missing.length}</span>`:`<span class="tl-meta" style="color:var(--accent)">✓ tem tudo</span>`}
          <button class="btn btn-sm rec-fav-inline ${isFav(r.id)?'on':''}" data-action="toggle-fav" data-id="${r.id}" style="margin-left:auto;padding:5px 11px">${isFav(r.id)?'❤️ Salvo':'🤍 Salvar'}</button>
        </div>
      </div></div>`;
  }).join("");

  return `
  ${head("📋","Cardápios","Seu plano do dia montado com o que você tem, no ritmo "+c.nome+". Cada refeição prioriza seus ingredientes disponíveis.")}
  <div class="card" style="margin-bottom:18px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:6px">
      <div class="section-title" style="margin:0">Metas de hoje <span class="pill" style="background:${c.corL};color:${c.cor}">${c.nome}</span></div>
      <button class="btn btn-sm btn-ghost" data-action="reset-metas">↺ Zerar dia</button>
    </div>
    <div class="meta-grid">${metasHtml}</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px">
    <div class="section-title" style="margin:0">🕐 Cronograma de hoje</div>
    <div class="fab-row">
      <button class="btn btn-sm" data-action="gerar-cardapio">🔀 Gerar outro</button>
      <button class="btn btn-sm btn-primary" data-action="salvar-historico">💾 Salvar no histórico</button>
    </div>
  </div>
  <div class="timeline">${tl}</div>`;
}

/* ---------- RECEITAS ---------- */
let recFilter = "todas"; // todas | completas | quase
let comprasShowFaltam = false, faltamSearch = "", faltamCat = "todas";
function renderReceitas(){
  if(!state.estoque.length) return head("👨‍🍳","Receitas","Receitas que combinam com o seu estoque.")+emptyEstoque();
  let list = getRecipes({intens:null, maxMissing:99});
  // ranque por estoque, mostra completas e quase-completas
  if(recFilter==="completas") list = list.filter(r=>r.complete);
  if(recFilter==="quase") list = list.filter(r=>!r.complete && r.missing.length<=2);
  const completas = getRecipes().filter(r=>r.complete).length;
  const filters = `<div class="chip-row" style="margin-bottom:18px">
    <button class="chip ${recFilter==='todas'?'on':''}" data-action="rec-filter" data-f="todas">Todas</button>
    <button class="chip ${recFilter==='completas'?'on':''}" data-action="rec-filter" data-f="completas">✓ Tenho tudo (${completas})</button>
    <button class="chip ${recFilter==='quase'?'on':''}" data-action="rec-filter" data-f="quase">Quase lá (faltam 1-2)</button>
  </div>`;
  const cards = list.length ? `<div class="grid g-auto">${list.map(recipeCard).join("")}</div>`
    : `<div class="empty"><span class="emj">🤔</span><h3>Nada por aqui</h3><p>Tente outro filtro ou adicione mais alimentos ao estoque.</p></div>`;
  return `
  ${head("👨‍🍳","Receitas","Tudo que dá para cozinhar agora, ordenado pelo que você já tem. As que faltam poucos itens viram sugestão de compra.")}
  ${filters}${cards}`;
}

function recipeCard(r){
  const cfg = INTENS[state.intensidade];
  const thumbBg = `linear-gradient(135deg,${cfg.corL},var(--surface-2))`;
  let match;
  if(r.complete) match=`<span class="match-tag" style="background:var(--accent)">✓ Tem tudo</span>`;
  else if(r.missing.length<=2) match=`<span class="match-tag" style="background:var(--amber)">Faltam ${r.missing.length}</span>`;
  else match=`<span class="match-tag" style="background:var(--text-faint)">Faltam ${r.missing.length}</span>`;
  const missNote = r.missing.length ? `<div class="miss-note">🛒 Falta: ${r.missing.map(id=>FOOD_MAP[id]?.nome||id).join(", ")}</div>` : "";
  const tipos = r.tipo.map(t=>({cafe:"Café",almoco:"Almoço",lanche:"Lanche",jantar:"Jantar",ceia:"Ceia"}[t])).slice(0,2);
  return `<div class="rec-card">
    <div class="rec-thumb" style="background:${thumbBg}">${r.emj}${match}
      <button class="rec-fav ${isFav(r.id)?'on':''}" data-action="toggle-fav" data-id="${r.id}">${isFav(r.id)?'❤️':'🤍'}</button>
    </div>
    <div class="rec-body">
      <h4>${r.nome}</h4>
      <div class="rec-meta">
        <span>⏱️ ${r.tempo} min</span><span>🔥 ~${r.kcal} kcal</span><span>🍽️ ${tipos.join(" · ")}</span>
      </div>
      <div class="rec-tags">${tipos.map(t=>`<span class="rtag">${t}</span>`).join("")}${r.missing.length?`<span class="rtag miss">${r.missing.length} p/ comprar</span>`:`<span class="rtag" style="background:var(--accent-l);color:var(--accent-d)">pronto p/ fazer</span>`}</div>
      ${missNote}
      <div class="rec-foot">
        <button class="btn btn-sm btn-primary" data-action="open-recipe" data-id="${r.id}" style="flex:1">Ver receita</button>
        ${r.missing.length?`<button class="btn btn-sm btn-ghost" data-action="add-missing" data-id="${r.id}" title="Adicionar itens faltantes à lista">🧾</button>`:""}
      </div>
    </div>
  </div>`;
}

/* ---------- RÁPIDAS ---------- */

  if(!state.estoque.length) return head("⚡","Receitas Rápidas","Pronto em até 15 minutos.")+emptyEstoque();

/* ---------- SEMANAL ---------- */
function renderSemanal(){
  if(!state.estoque.length) return head("🗓️","Organização Semanal","Sua semana planejada.")+emptyEstoque();
  const cfg = INTENS[state.intensidade];
  if(!state.semana || state.semana.intensidade!==state.intensidade){ state.semana = gerarSemana(); save(); }
  const dias = state.semana.dias;
  const rows = state.semana.grid.map(row=>{
    const cells = row.ids.map(id=>{
      const r = id && RECIPES.find(x=>x.id===id);
      return r ? `<div class="wk-cell"><div class="meal">${r.emj} ${r.nome}</div></div>`
               : `<div class="wk-cell empty">—</div>`;
    }).join("");
    return `<div class="wk-cell wk-label">${row.label}</div>${cells}`;
  }).join("");
  const headRow = `<div class="wk-cell wk-label" style="background:transparent;border:none"></div>${dias.map(d=>`<div class="wk-cell wk-head">${d}</div>`).join("")}`;
  const faltas = consumoSemana().filter(c=>c.falta>0);
  const consumoBanner = faltas.length
    ? `<div class="banner" style="background:linear-gradient(120deg,var(--amber-l),var(--surface-2))">
        <span class="emj">🛒</span>
        <div style="flex:1"><h4>Sua semana consome mais do que você tem</h4>
          <p>${faltas.length} ingrediente(s) não têm quantidade suficiente para todas as refeições planejadas.</p></div>
        <button class="btn btn-sm btn-primary" data-action="nav" data-tab="compras">Ver na lista →</button></div>`
    : `<div class="banner" style="background:linear-gradient(120deg,var(--accent-l),var(--surface-2))">
        <span class="emj">✅</span>
        <div><h4>Estoque suficiente para a semana</h4>
          <p>As quantidades do seu estoque cobrem todas as refeições planejadas.</p></div></div>`;
  return `
  ${head("🗓️","Organização Semanal","Uma semana variada montada com o seu estoque no perfil "+cfg.nome+" — sem repetir a mesma receita em dias seguidos.")}
  ${consumoBanner}
  <div class="fab-row" style="margin-bottom:16px">
    <button class="btn btn-primary" data-action="regen-semana">🔀 Gerar nova semana</button>
    <button class="btn btn-ghost" data-action="nav" data-tab="compras">🧾 Ver lista de compras</button>
  </div>
  <div class="week-scroll"><div class="week-grid">${headRow}${rows}</div></div>
  <p class="muted" style="font-size:13px;margin-top:14px">💡 Dica: cozinhe proteínas e grãos em maior quantidade no início da semana para montar pratos diferentes nos dias corridos.</p>`;
}

    const dest = has(s.from)?`<span class="rtag" style="background:var(--amber-l);color:var(--amber)">no seu estoque</span>`:"";
    return `<div class="sub-card">
      <div class="sub-flow">
        <span class="sub-from">${FOOD_MAP[s.from]?.emoji||"🍽️"} ${s.fromN}</span>

      <div class="sub-card"><div class="sub-flow"><span class="sub-from">🥛 Sem creme de leite?</span><span class="sub-arrow">→</span><span class="sub-to">Iogurte ou requeijão batido</span></div><div class="sub-why">Garante cremosidade em strogonoff e molhos.</div></div>
      <div class="sub-card"><div class="sub-flow"><span class="sub-from">🍝 Sem macarrão?</span><span class="sub-arrow">→</span><span class="sub-to">Arroz, batata ou legumes</span></div><div class="sub-why">Substitui a base de carboidrato do prato.</div></div>
      <div class="sub-card"><div class="sub-flow"><span class="sub-from">🍞 Sem pão?</span><span class="sub-arrow">→</span><span class="sub-to">Tapioca, cuscuz ou torrada</span></div><div class="sub-why">Mantém o café da manhã sem precisar sair de casa.</div></div>
    </div>`;

/* ---------- COMPRAS ---------- */
function consumoRow(c){
  if(c.preciso){
    const pct = c.need ? Math.min(100, Math.round(c.have/c.need*100)) : 100;
    return `<div class="consumo-row ${c.falta>0?'short':''}">
      <span class="emj">${c.emoji}</span>
      <span class="cn">${c.nome}</span>
      <span class="cbar"><div style="width:${pct}%"></div></span>
      <span class="cnum">tem ${fmtQty(c.have)} · precisa ${fmtQty(c.need)} ${c.refUnit}</span>
      ${c.falta>0?`<span class="ctag short">faltam ${fmtQty(c.falta)}</span>`:`<span class="ctag ok">ok</span>`}
    </div>`;
  }
  // unidade personalizada (ex.: kg, ml, ½ pacote): mostramos como referência, sem subtração
  const inList = state.compras.some(x=>x.id===c.id);
  return `<div class="consumo-row ref">
    <span class="emj">${c.emoji}</span>
    <span class="cn">${c.nome}</span>
    <span class="cnum" style="flex:1">usado em ${c.usos} refeição(ões) nesta semana · você tem ${fmtQty(c.have)} ${c.userUnit} (confira se cobre)</span>
    <button class="ctag ${inList?'ok':'refbtn'}" data-action="add-from-food" data-id="${c.id}">${inList?'na lista':'＋ incluir'}</button>
  </div>`;
}

  if(faltamCat!=="todas") foods = foods.filter(f=>f.cat===faltamCat);

    <button class="cat-pill ${faltamCat==='todas'?'on':''}" data-action="faltam-cat" data-cat="todas">🍴 Todas</button>

function renderCompras(){
  const list = state.compras;
  const done = list.filter(c=>c.done).length;
  const consumo = consumoSemana();
  const faltas = consumo.filter(c=>c.preciso && c.falta>0);
  const refs = consumo.filter(c=>!c.preciso);
  const okCount = consumo.filter(c=>c.preciso && c.falta===0).length;

  // ----- painel de consumo da semana -----
  let consumoHtml;
  if(!state.semana){
    consumoHtml = `<div class="banner"><span class="emj">📊</span>
      <div style="flex:1"><h4>Acompanhe o consumo da semana</h4>
        <p>Gere sua Organização Semanal para comparar o que as receitas consomem com as quantidades do seu estoque.</p></div>
      <button class="btn btn-sm btn-primary" data-action="nav" data-tab="semanal">Montar semana</button></div>`;
  } else {
    const rows = [...faltas, ...refs];
    const rowsHtml = rows.length
      ? rows.map(consumoRow).join("")
      : `<div class="muted" style="font-size:13.5px;padding:6px 2px">🎉 Suas quantidades cobrem toda a semana planejada — nada faltando.</div>`;
    consumoHtml = `<div class="card" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div class="section-title" style="margin:0">📊 Consumo da semana <span class="pill">${INTENS[state.semana.intensidade]?.nome||""}</span></div>
        ${faltas.length?`<button class="btn btn-sm btn-primary" data-action="add-faltas">＋ Adicionar ${faltas.length} item(ns) em falta</button>`:""}
      </div>
      <p class="muted" style="font-size:13px;margin:8px 0 13px">Quanto a sua semana planejada consome de cada ingrediente x o que você tem no estoque. Itens em unidade personalizada aparecem como referência.</p>
      ${rowsHtml}
      ${okCount>0?`<div class="muted" style="font-size:12.5px;margin-top:11px">✓ ${okCount} ingrediente(s) com quantidade suficiente no estoque.</div>`:""}
    </div>`;
  }

  // ----- sugestões p/ destravar receitas -----
  const quase = getRecipes({maxMissing:2}).filter(r=>!r.complete && r.missing.length<=2);
  const sugIds = [...new Set(quase.flatMap(r=>r.missing))].filter(id=>!list.some(c=>c.id===id)).slice(0,10);
  const sugHtml = sugIds.length ? `<div class="card" style="margin-bottom:18px">
    <div class="section-title" style="margin-top:0">💡 Sugestões para destravar receitas</div>
    <p class="muted" style="font-size:13px;margin-bottom:12px">Estes itens completam receitas que estão quase prontas no seu estoque.</p>
    <div class="chip-row">${sugIds.map(id=>`<button class="chip" data-action="add-compra-sug" data-id="${id}">${FOOD_MAP[id]?.emoji} ${FOOD_MAP[id]?.nome} <span class="x">＋</span></button>`).join("")}</div>
  </div>` : "";

  // ----- itens da lista (com quantidade) -----
  const items = list.length ? list.map((c,i)=>`
    <div class="list-item ${c.done?'done':''}">
      <button class="lcheck ${c.done?'on':''}" data-action="toggle-compra" data-i="${i}">${c.done?'✓':''}</button>
      <span class="lname">${c.emoji||"🛒"} ${c.nome}</span>
      <div class="qty lqty" data-action="noop">
        <button data-action="compra-qtd-dec" data-i="${i}" aria-label="diminuir">−</button>
        <input class="lqv-input" type="number" inputmode="decimal" min="0" step="${stepFor(c.unidade||'un')}" value="${c.qtd||1}" data-i="${i}" aria-label="quantidade">
        <button data-action="compra-qtd-inc" data-i="${i}" aria-label="aumentar">＋</button>
        <select class="unit-sel lunit" data-i="${i}" data-action="noop">${unitOptions(c.unidade||"un")}</select>
      </div>
      <button class="del-btn" data-action="del-compra" data-i="${i}">✕</button>
    </div>`).join("") : `<div class="empty"><span class="emj">🧾</span><h3>Lista vazia</h3><p>Adicione itens manualmente, pelo consumo da semana, pelas sugestões ou pelos itens que faltam no estoque.</p></div>`;

  return `
  ${head("🧾","Lista de Compras","O que falta para completar suas receitas e cobrir a semana — com quantidades. Inclua também itens do app que você não tem ou qualquer coisa manualmente.")}
  ${list.length?`<div class="stat-row">
    <div class="stat"><div class="lab">🛒 Itens</div><div class="num">${list.length}</div></div>

  </div>`:""}
  <div class="toolbar">
    <div class="search"><span class="ic">＋</span><input id="compraInput" placeholder="Adicionar item (ex.: 4 batatas) e pressione Enter..."></div>
    <button class="btn btn-sm btn-primary" data-action="add-compra-manual">Adicionar</button>
    <button class="btn btn-sm ${comprasShowFaltam?'btn-primary':'btn-ghost'}" data-action="toggle-faltam">🛍️ Itens que faltam</button>
    ${list.length?`<button class="btn btn-sm btn-ghost" data-action="clear-compras">🗑️ Limpar</button>`:""}
  </div>
  ${comprasShowFaltam?renderFaltamPicker():""}

  ${sugHtml}
  ${items}`;
}

let toastTimer=null;
function toast(msg, emj="✓"){
  const w = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className="toast"; t.innerHTML=`<span class="ic">${emj}</span>${msg}`;
  w.appendChild(t);
  setTimeout(()=>{ t.style.transition="all .3s"; t.style.opacity="0"; t.style.transform="translateY(10px)"; setTimeout(()=>t.remove(),300); }, 2200);
}

// adiciona à lista de compras com quantidade; se já existir, ajusta para a maior quantidade.
// retorna true se um item novo foi criado.
function addCompraById(id, qty){
  qty = qty || 1;
  const f = FOOD_MAP[id];
  const ex = state.compras.find(c=>c.id===id);
  if(ex){ ex.qtd = Math.max(ex.qtd||1, qty); save(); return false; }
  state.compras.push({id, nome:f?f.nome:id, emoji:f?f.emoji:"🛒", cat:f?f.cat:"", done:false, qtd:qty, unidade:f?unitOf(id):"un"});
  save(); return true;
}
// atualiza só o campo de quantidade no card do estoque, sem re-render (preserva scroll)
function updateQtyUI(id){
  document.querySelectorAll('.food[data-id="'+id+'"] .qv-input').forEach(el=>{ el.value = qtyOf(id); el.step = stepFor(unitOf(id)); });
}
// atualiza só o campo de quantidade de um item da lista de compras, sem re-render
function updateCompraQtyUI(i){
  const c=state.compras[i]; if(!c) return;
  const el=document.querySelector('.lqv-input[data-i="'+i+'"]'); if(el) el.value=c.qtd;
}

const COMMON_ITEMS = ["paofrances","ovo","arroz","feijao","leite","cafe","manteiga","queijoprato","frango","macarrao","tomate","cebola","alho","banana","azeite","sal","oleo","acucar","molhotomate","aveia"];

const ACTIONS = {
  "nav":(d)=>navTo(d.tab),
  "open-menu":()=>{document.getElementById("sidebar").classList.add("open");document.getElementById("scrim").classList.add("show");},
  "close-menu":()=>{document.getElementById("sidebar").classList.remove("open");document.getElementById("scrim").classList.remove("show");},
  "toggle-theme":()=>{ state.theme = state.theme==="dark"?"light":"dark"; applyTheme(); save(); },
  "noop":()=>{},
  "toggle-food":(d)=>{
    const id=d.id, i=state.estoque.indexOf(id);
    if(i>=0){ state.estoque.splice(i,1); delete state.qtd[id]; delete state.unidade[id]; }
    else { state.estoque.push(id); if(state.qtd[id]==null) state.qtd[id]=1; }
    state.cardapio=null; save();
    // re-render leve do estoque (preserva scroll)
    if(currentTab==="estoque"){ patchEstoque(); } else render();
    renderNav();
  },
  "qtd-inc":(d)=>{ if(!has(d.id)) return; const st=stepFor(unitOf(d.id)); state.qtd[d.id]=Math.round((qtyOf(d.id)+st)*100)/100; save(); updateQtyUI(d.id); },
  "qtd-dec":(d)=>{ if(!has(d.id)) return; const st=stepFor(unitOf(d.id)); state.qtd[d.id]=Math.max(0,Math.round((qtyOf(d.id)-st)*100)/100); save(); updateQtyUI(d.id); },
  "filter-cat":(d)=>{ estoqueCat=d.cat; render(); },
  "add-essentials":()=>{
    let added=0;
    COMMON_ITEMS.forEach(id=>{ if(!has(id)){ state.estoque.push(id); if(state.qtd[id]==null) state.qtd[id]=1; added++; } });
    state.cardapio=null; save(); render();
    toast(added?`${added} itens comuns adicionados`:"Você já tem os básicos", "✨");
  },
  "clear-estoque":()=>{ if(confirm("Limpar todo o estoque?")){ state.estoque=[]; state.qtd={}; state.unidade={}; state.cardapio=null; save(); render(); toast("Estoque limpo","🗑️"); } },
  "toggle-objetivo":(d)=>{ toggleArr(state.objetivos,d.id); save(); render(); },
  "toggle-restricao":(d)=>{ toggleArr(state.restricoes,d.id); state.cardapio=null; save(); render(); },
  "set-intensidade":(d)=>{ state.intensidade=d.id; state.cardapio=null; save(); render(); toast(`Perfil ${INTENS[d.id].nome} ativado`, INTENS[d.id].emj); },
  "gerar-cardapio":()=>{ state.cardapio={intensidade:state.intensidade, plano:gerarCardapio(), date:todayStr()}; save(); render(); toast("Novo cardápio gerado","🔀"); },
  "salvar-historico":()=>{
    if(!state.cardapio) return;
    const refeicoes = state.cardapio.plano.filter(p=>p.recipe).map(p=>({hora:p.hora, nome:p.recipe.nome, emj:p.recipe.emj}));
    if(!refeicoes.length){ toast("Nada para salvar ainda"); return; }
    state.historico.push({intensidade:state.intensidade, refeicoes, dataLabel:new Date().toLocaleString("pt-BR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})});
    save(); toast("Plano salvo no histórico","💾"); renderNav();
  },
  "meta-inc":(d)=>{ state.metasDia[d.meta]=(state.metasDia[d.meta]||0)+1; save(); render(); },
  "meta-dec":(d)=>{ state.metasDia[d.meta]=Math.max(0,(state.metasDia[d.meta]||0)-1); save(); render(); },
  "reset-metas":()=>{ state.metasDia={date:todayStr(),agua:0,refeicoes:0,vegetais:0,proteina:0}; save(); render(); toast("Metas do dia zeradas","↺"); },
  "rec-filter":(d)=>{ recFilter=d.f; render(); },
  "open-recipe":(d)=>openRecipe(d.id),
  "close-modal":()=>closeModal(),
  "toggle-fav":(d)=>{
    const was=isFav(d.id);
    toggleArr(state.favoritos,d.id); save();
    if(document.getElementById("modalBg").classList.contains("show")) openRecipe(d.id);
    render();
    toast(was?"Removido dos favoritos":"Adicionado aos favoritos", was?"🤍":"❤️");
  },
  "add-missing":(d)=>{
    const r=RECIPES.find(x=>x.id===d.id); if(!r) return;
    const m=recipeMatch(r); let n=0;
    m.missing.forEach(id=>{ if(addCompraById(id, ingNeed(r,id))) n++; });
    render(); renderNav(); toast(n?`${n} item(ns) na lista de compras`:"Já estavam na lista","🧾");
  },
  "add-compra-sug":(d)=>{ addCompraById(d.id,1); render(); renderNav(); toast("Adicionado à lista","🧾"); },
  // adiciona à lista os itens em falta (cálculo exato) com a quantidade que falta
  "add-faltas":()=>{
    const faltas=consumoSemana().filter(c=>c.preciso && c.falta>0); let n=0;
    faltas.forEach(c=>{ if(addCompraById(c.id, c.falta)) n++; });
    save(); render(); renderNav();
    toast(faltas.length?`${faltas.length} item(ns) com quantidade adicionados`:"Nada faltando","🧾");
  },
  "toggle-faltam":()=>{ comprasShowFaltam=!comprasShowFaltam; render(); },
  "faltam-cat":(d)=>{ faltamCat=d.cat; render(); },
  "add-from-food":(d)=>{
    const novo=addCompraById(d.id,1); render(); renderNav();
    toast(novo?"Adicionado à lista de compras":"Já está na lista","🛍️");
  },
  "compra-qtd-inc":(d)=>{ const i=+d.i,c=state.compras[i]; if(!c)return; const st=stepFor(c.unidade||'un'); c.qtd=Math.round(((c.qtd||1)+st)*100)/100; save(); updateCompraQtyUI(i); },
  "compra-qtd-dec":(d)=>{ const i=+d.i,c=state.compras[i]; if(!c)return; const st=stepFor(c.unidade||'un'); c.qtd=Math.max(0,Math.round(((c.qtd||1)-st)*100)/100); save(); updateCompraQtyUI(i); },
  "add-compra-manual":()=>{
    const inp=document.getElementById("compraInput"); if(!inp) return;
    let v=inp.value.trim(); if(!v) return;
    let qtd=1; const m=v.match(/^(\d+(?:[.,]\d+)?)\s+(.+)$/); if(m){ qtd=Math.max(0,parseFloat(m[1].replace(",","."))); v=m[2]; }
    state.compras.push({id:"manual_"+Date.now(), nome:v, emoji:"🛒", cat:"", done:false, qtd, unidade:"un"});
    save(); render(); renderNav();
  },
  "toggle-compra":(d)=>{ const i=+d.i; if(state.compras[i]){ state.compras[i].done=!state.compras[i].done; save(); render(); } },
  "del-compra":(d)=>{ state.compras.splice(+d.i,1); save(); render(); renderNav(); },
  "clear-compras":()=>{ if(confirm("Limpar lista de compras?")){ state.compras=[]; save(); render(); renderNav(); } },
  "regen-semana":()=>{ state.semana=gerarSemana(); save(); render(); toast("Nova semana gerada","🔀"); },
  "salvar-semana":()=>toast("Semana pronta!"),
  "clear-historico":()=>{ if(confirm("Limpar todo o histórico?")){ state.historico=[]; save(); render(); } },
  "del-historico":(d)=>{ state.historico.splice(+d.i,1); save(); render(); },
};

function toggleArr(arr,v){ const i=arr.indexOf(v); if(i>=0) arr.splice(i,1); else arr.push(v); }

// atualiza apenas os números das estatísticas do estoque (sem re-render)
function patchEstoqueStats(){
  const content=document.getElementById("content");
  if(currentTab!=="estoque") return;
  const statNums=content.querySelectorAll(".stat .num");
  if(statNums[0]) statNums[0].innerHTML=`${state.estoque.length}<small> itens</small>`;
  if(statNums[1]) statNums[1].innerHTML=`${getRecipes({mode:"makeable"}).length}<small> receitas</small>`;
  if(statNums[2]) statNums[2].textContent=new Set(state.estoque.map(id=>FOOD_MAP[id]?.cat)).size;
}
// patch só dos botões do estoque para preservar o scroll ao marcar itens
function patchEstoque(){
  document.querySelectorAll(".food").forEach(btn=>{
    const id=btn.dataset.id;
    btn.classList.toggle("on", has(id));
    const qv=btn.querySelector(".qv-input"); if(qv){ qv.value=qtyOf(id); qv.step=stepFor(unitOf(id)); }
  });
  patchEstoqueStats();
  // counts por categoria
  document.getElementById("content").querySelectorAll(".cat-block").forEach(block=>{
    const items=[...block.querySelectorAll(".food")];
    const sel=items.filter(b=>has(b.dataset.id)).length;
    const cnt=block.querySelector(".count");
    if(cnt) cnt.textContent=`${sel}/${items.length} no estoque`;
  });
}

/* ---------- EVENT DELEGATION ---------- */
document.addEventListener("click",(e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const act = el.dataset.action;
  if(ACTIONS[act]){ e.preventDefault(); ACTIONS[act](el.dataset); }
});
// search + enter handlers
document.addEventListener("input",(e)=>{
  if(e.target.id==="estoqueSearch"){ estoqueSearch=e.target.value; render();
    const inp=document.getElementById("estoqueSearch"); if(inp){ inp.focus(); inp.setSelectionRange(estoqueSearch.length,estoqueSearch.length); } }
  if(e.target.id==="faltamSearch"){ faltamSearch=e.target.value; render();
    const inp=document.getElementById("faltamSearch"); if(inp){ inp.focus(); inp.setSelectionRange(faltamSearch.length,faltamSearch.length); } }
  // quantidade editável no estoque (sem re-render, preserva foco)
  if(e.target.classList.contains("qv-input")){
    const id=e.target.dataset.id; const v=parseFloat(String(e.target.value).replace(",","."));
    if(isNaN(v)) return; state.qtd[id]=Math.max(0,v); save();
  }
  // quantidade editável na lista de compras
  if(e.target.classList.contains("lqv-input")){
    const c=state.compras[+e.target.dataset.i]; if(!c) return;
    const v=parseFloat(String(e.target.value).replace(",",".")); if(isNaN(v)) return; c.qtd=Math.max(0,v); save();
  }
});
// troca de unidade de medida (estoque e lista de compras)
document.addEventListener("change",(e)=>{
  if(e.target.classList.contains("lunit")){
    const c=state.compras[+e.target.dataset.i]; if(c){ c.unidade=e.target.value; save();
      const inp=e.target.closest(".qty"); if(inp){ const f=inp.querySelector(".lqv-input"); if(f) f.step=stepFor(e.target.value); } }
  } else if(e.target.classList.contains("unit-sel")){
    const id=e.target.dataset.id; state.unidade[id]=e.target.value; save();
    const inp=e.target.closest(".qty"); if(inp){ const f=inp.querySelector(".qv-input"); if(f) f.step=stepFor(e.target.value); }
  }
});
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && e.target.id==="compraInput"){ e.preventDefault(); ACTIONS["add-compra-manual"](); }
  if(e.key==="Escape") closeModal();
});

/* ---------- THEME ---------- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", state.theme==="dark"?"dark":"light");
  const ic=document.getElementById("themeIc"), lbl=document.getElementById("themeLbl");
  if(ic) ic.textContent = state.theme==="dark"?"☀️":"🌙";
  if(lbl) lbl.textContent = state.theme==="dark"?"Modo claro":"Modo escuro";
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  load();
  applyTheme();
  renderNav();
  updateIntensPill();
  navTo("estoque");
  // dev check: valida referências de ingredientes
  let bad=[];
  RECIPES.forEach(r=>[...(r.ess||[]),...(r.opt||[]),...(r.optAny||[])].forEach(id=>{ if(!FOOD_MAP[id]) bad.push(r.id+":"+id); }));
  if(bad.length) console.warn("Ingredientes inexistentes:",bad);
}
init();

/* ---------- PWA: registra o service worker (só funciona via http/https) ---------- */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(e=>console.warn("SW falhou:",e));
  });
}
</script>
